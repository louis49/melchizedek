name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement to melchizedek!

  - type: input
    id: version
    attributes:
      label: melchizedek version
      description: Run `npm list melchizedek` or check package.json
      placeholder: "1.0.0"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Feature description
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature useful? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered any alternative solutions or workarounds?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other relevant information (screenshots, examples, etc.)
